<script>
// ── Config ────────────────────────────────────────────────────────────────────
const GITHUB_USER  = "iknowdrfre";
const GITHUB_REPO  = "garmin-zone2";
const GITHUB_TOKEN = "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";
const WORKFLOW_ID  = "fetch.yml";
const FILTER_STORAGE_KEY = "minActivityMinutes";

// ── Fetch data.json ───────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch(`data.json?_=${Date.now()}`);
  if (!res.ok) throw new Error("Kunde inte ladda data.json");
  return res.json();
}

// ── Trigger GitHub Action ─────────────────────────────────────────────────────
async function triggerRefresh(btn) {
  if (!GITHUB_TOKEN) {
    alert("Lägg till din GitHub PAT i index.html för att aktivera manuell uppdatering.");
    return;
  }
  btn.disabled = true;
  btn.textContent = "Startar uppdatering…";
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${GITHUB_TOKEN}`,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
    if (res.status === 204) {
      btn.textContent = "Uppdatering startad — klart om ~1 min";
      setTimeout(() => { btn.disabled = false; btn.textContent = "Uppdatera nu"; }, 90_000);
    } else {
      btn.textContent = "Något gick fel — försök igen";
      btn.disabled = false;
    }
  } catch {
    btn.textContent = "Nätverksfel";
    btn.disabled = false;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtHM(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${String(m).padStart(2,"0")}m`;
}

function parseDurationToSeconds(duration) {
  if (!duration) return 0;
  const parts = duration.split(":").map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return 0;
  const [hh, mm, ss] = parts;
  return hh * 3600 + mm * 60 + ss;
}

function getMinMinutes(data) {
  const saved = localStorage.getItem(FILTER_STORAGE_KEY);
  if (saved !== null && saved !== "" && !Number.isNaN(Number(saved))) {
    return Number(saved);
  }
  return Number(data.min_activity_minutes || 10);
}

function setMinMinutes(value) {
  localStorage.setItem(FILTER_STORAGE_KEY, String(value));
}

function getISOWeek(dateStr) {
  const date = new Date(`${dateStr}T12:00:00`);
  const target = new Date(date.valueOf());
  const dayNr = (date.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = new Date(target.getFullYear(), 0, 4);
  const firstDayNr = (firstThursday.getDay() + 6) % 7;
  firstThursday.setDate(firstThursday.getDate() - firstDayNr + 3);
  return 1 + Math.round((target - firstThursday) / 604800000);
}

function filterActivitiesByMinutes(activities, minMinutes) {
  const minSeconds = minMinutes * 60;
  return activities.filter(a => parseDurationToSeconds(a.duration_fmt) > minSeconds);
}

function sumZone2Seconds(activities) {
  return activities.reduce((sum, a) => sum + (a.zone2_seconds || 0), 0);
}

function buildWeekMap(activities, maxWeek = 53) {
  const byWeek = {};
  for (const a of activities) {
    if (!a.date) continue;
    const week = getISOWeek(a.date);
    if (week < 1 || week > maxWeek) continue;
    byWeek[String(week)] = (byWeek[String(week)] || 0) + (a.zone2_seconds || 0);
  }
  return byWeek;
}

// ── Render ────────────────────────────────────────────────────────────────────
async function render() {
  const app = document.getElementById("app");
  let data;
  try { data = await loadData(); }
  catch (e) {
    app.innerHTML = `<p class="state-msg">Fel: ${e.message}</p>`;
    return;
  }

  const thisY = String(data.this_year);
  const lastY = String(data.last_year);

  const minMinutes = getMinMinutes(data);

  const thisActivities = filterActivitiesByMinutes(data.years[thisY].by_activity || [], minMinutes);
  const lastActivities = filterActivitiesByMinutes(data.years[lastY].by_activity || [], minMinutes);
  const lastYtdActivities = filterActivitiesByMinutes(data.years[lastY].by_activity_ytd || [], minMinutes);

  const thisTotalSeconds = sumZone2Seconds(thisActivities);
  const lastTotalSeconds = sumZone2Seconds(lastActivities);
  const lastYtdSeconds = sumZone2Seconds(lastYtdActivities);

  const thisByWeek = buildWeekMap(thisActivities, data.current_week || 53);

  document.getElementById("updated").textContent = `Uppdaterad ${data.updated_at}`;

  const delta = thisTotalSeconds - lastYtdSeconds;
  const aheadBehind = delta >= 0
    ? `+${fmtHM(Math.abs(delta))} före fjolåret`
    : `${fmtHM(Math.abs(delta))} efter fjolåret`;
  const isAhead = delta >= 0;

  const barPct = lastTotalSeconds > 0
    ? Math.min(100, Math.round((thisTotalSeconds / lastTotalSeconds) * 100))
    : 0;

  const maxWeek = data.current_week;
  const maxSecs = Math.max(...Object.values(thisByWeek).map(Number), 1);

  let weekCells = "";
  for (let w = 1; w <= maxWeek; w++) {
    const s = thisByWeek[String(w)] || 0;
    const pct = Math.round((s / maxSecs) * 100);
    weekCells += `
      <div class="week-cell">
        <div class="fill" style="height:0%" data-pct="${pct}"></div>
        <span class="wlabel">v${w} · ${fmtHM(s)}</span>
      </div>`;
  }

  const recent = thisActivities.slice(0, 15);
  const actRows = recent.length
    ? recent.map(a => `
      <div class="activity-row">
        <span class="act-date">${a.date}</span>
        <span class="act-name">${a.name}</span>
        <span class="act-z2 ${a.zone2_seconds === 0 ? 'zero' : ''}">${a.zone2_fmt}</span>
      </div>`).join("")
    : `<p class="state-msg" style="margin-top:1rem;">Inga aktiviteter matchar filtret.</p>`;

  app.innerHTML = `
    <div class="main-card animate">
      <div class="year-row">
        <span class="year-tag">${data.this_year}</span>
        <span class="delta ${isAhead ? 'ahead' : ''}">${aheadBehind}</span>
      </div>
      <div class="big-time">${fmtHM(thisTotalSeconds)}</div>

      <div class="bar-wrap">
        <div class="bar-fill" id="bar" data-pct="${barPct}"></div>
      </div>
      <span class="bar-label">${barPct}% av fjolårets totala zon 2</span>

      <div class="year-row" style="margin-top:0">
        <span class="year-tag">${data.last_year} (totalt)</span>
      </div>
      <div class="big-time last">${fmtHM(lastTotalSeconds)}</div>
    </div>

    <p class="section-title animate delay-1">Zon 2 per vecka — ${data.this_year}</p>
    <div class="week-grid animate delay-2">${weekCells}</div>

    <p class="section-title animate delay-3">Senaste aktiviteter</p>
    <div class="activity-list animate delay-4">${actRows}</div>

    <div class="refresh-wrap animate delay-4">
      <button id="refreshBtn" onclick="triggerRefresh(this)">↻ Uppdatera nu</button>
      <p class="refresh-note">Hämtar ny data från Garmin — tar ~1 minut</p>
    </div>

    <div class="refresh-wrap animate delay-4" style="margin-top:1rem;">
      <label for="minMinutesInput" class="label" style="display:block; margin-bottom:0.6rem;">
        Min aktivitetstid (minuter)
      </label>
      <input
        id="minMinutesInput"
        type="number"
        min="0"
        step="1"
        value="${minMinutes}"
        style="
          width:100%;
          padding:0.9rem;
          background:transparent;
          border:1px solid var(--green-dim);
          color:var(--green);
          font-family:'DM Mono', monospace;
          font-size:0.9rem;
          border-radius:2px;
        "
      />
      <p class="refresh-note">Visar bara aktiviteter längre än detta värde.</p>
    </div>
  `;

  const input = document.getElementById("minMinutesInput");
  input.addEventListener("change", () => {
    const value = Math.max(0, Number(input.value) || 0);
    setMinMinutes(value);
    render();
  });

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById("bar").style.width = barPct + "%";
      document.querySelectorAll(".week-cell .fill").forEach(el => {
        el.style.height = el.dataset.pct + "%";
      });
    }, 300);
  });
}

render();
</script>
